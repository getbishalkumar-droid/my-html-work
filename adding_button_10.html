<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adding button</title>
</head>
<body>
    <a href="https://google.com" target="_blank" title="go to google">
    <button style="font-size: 25px;background-color: aqua;color:red;border-radius:25px ;">
        click me
    </button>
    </a><br>
    <button onclick="doSomething()"  style="font-size:25px;background-color: aqua;color:red;border-radius:25px ;">
        click me
    </button>
    <p id="greeting">Hello</p>


    <script>
        function doSomething(){
            document.getElementById("greeting").innerHTML="Goodbye";

        }
    </script>
</body>
</html>
