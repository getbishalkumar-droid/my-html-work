<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
  <form action="index.php" method="post" enctype="multipart/form-data">
    <label for="username">username:</label>
    <input type="text" id="username" placeholder="username" minlength="6" maxlength="15" required>
<br>
  <lable for="password">password:</lable>
  <input type="password" id="passward" placeholder="passward" required>
<br>
  <lable for="email">email:</lable>
  <input type="email" placeholder="getbishalkumar@gmail.com" required><br>

  <label for="tel">Phone</label>
  <input type="tel" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"><br>

  <lable for="bday">birthday:</lable>
  <input type="date" id="bday"><br>

  <label for="quantity">quantity</label>
  <input type="number" id="quantity" min="0" max="99" value="1" ><br>

  <label for="title">title:</label>

  <lable for="Mr.">Mr.</lable>
  <input type="radio" id="Mr." name="title">
  <lable for="Ms.">Ms.</lable>
  <input type="radio" id="Ms."  name="title">
  <lable for="phd.">phd.</lable>
  <input type="radio" id="phd."  name="title"><br>

  <lable for="payment">Payment</lable>
  <select id="payment">
     <option value="visa">visa</option>
     <option value="mastercard">mastercard</option>
     <option value="giftcard">giftcard</option>
  </select><br>
   <lable for="subscribe">subscribe:</lable>
   <input type="checkbox" id="subscribe"><br>

    <lable for="comment">comment:</lable>
    <textarea id="comment" rows="3" cols="25"></textarea><br>

    <lable for="file">FIle</lable>
    <input type="file" id="file" accept="image/png,image/jpge"><br>

  <input type="submit"><br>
  <input type="reset">
  </form>  
</body>
</html>
