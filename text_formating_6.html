<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text formating</title>
    <link rel="icon" href="https://i.pinimg.com/1200x/d6/ed/f0/d6edf002dee9f305cfee03f1006df7b5.jpg"
    type="image/jpg">
</head>
<body>
 <P>1.This is normel text</P>
 <p>2.this is <b>bold</b> text</p>  
 <p>3.this is <i>italic</i> text</p>
 <p>4.this is <u>underline</u> text</p>
 <p>5.this is <big>big</big> text</p>
 <p>6.this is <small>small</small> text</p> 
 <p>7.H<SUB>2</SUB>O</p>
 <p>8.3<sup>3</sup> = 9</p>
 <P>9.this is <del>deleted</del> text</P>
 <p>10.this is <tt>monospaced</tt> text</p>
 <p>11.this is <mark style="background-color:red">mark</mark> text</p>

</body>
</html>
